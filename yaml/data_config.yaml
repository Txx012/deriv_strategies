      ".GI": "GI"           # 全球指数
    field_mappings:
      # 股票L2表（对齐标的格式：600000.SH → 自动解析）
      StockL2Snap:
        windcode: SecurityId    # 对齐Wind字段名：windcode
        trade_date: DateTime    # 时间字段
        last_price: LastPrice   # 最新价
        pre_close: PreClosePrice
        offer_price: OfferPrice
        offer_volume: OfferVolume
        bid_price: BidPrice
        bid_volume: BidVolume
        trade_volume: TotalVolume
        trade_amount: TotalAmount
      # 期货L2表
      FutureL2:
