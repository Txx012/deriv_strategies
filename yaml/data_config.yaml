        open_interest: OpenInterest   # 持仓量 仅沪深、沪深期权、期货市场
        pre_settle: PreSettlePrice  # 前结算价 仅沪深期权、期货市场
      # 分钟线表
      MinuteLine:
        windcode: SecurityId    # 对齐Wind字段名：windcode
        trade_date: TradeDate
        time: Time     # 分钟
        open: OpenPrice
        high: HighestPrice
        low: LowestPrice
        close: ClosePrice
        volume: Volume
        amount: Amount
        trade_num: TradeNum
        open_interest: OpenInterest

